<!DOCTYPE html>
<html>
<head>
    <title>Royal Palace Hotel</title>

    <style>
        body{
            margin:0;
            font-family: Arial;
        }

        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 40px;
            background: rgba(0,0,0,0.6);
            position:fixed;
            width:100%;
            top:0;
            z-index:10;
        }

        .logo{
            color:gold;
            font-size:22px;
            font-weight:bold;
        }

        .navbar ul{
            list-style:none;
            display:flex;
            gap:25px;
            margin-right: 100px;
            padding:0;
        }

        .navbar ul li a{
            text-decoration:none;
            color:white;
            font-size:18px;
        }

        .navbar ul li a:hover{
            color:gold;
        }

        .hero{
            height:100vh;
            position:relative;
            overflow:hidden;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .slideshow{
            position:absolute;
            width:100%;
            height:100%;
            top:0;
            left:0;
            z-index:-1;
        }

        .slideshow img{
            position:absolute;
            width:100%;
            height:100%;
            object-fit:cover;
            opacity:0;
            animation: fade 9s infinite;
        }

        .slideshow img:nth-child(1){
            animation-delay:0s;
        }

        .slideshow img:nth-child(2){
            animation-delay:3s;
        }

        .slideshow img:nth-child(3){
            animation-delay:6s;
        }

        @keyframes fade{
            0%{opacity:0;}
            10%{opacity:1;}
            30%{opacity:1;}
            40%{opacity:0;}
            100%{opacity:0;}
        }

        .hero h1{
            font-size:55px;
            color:white;
            background:rgba(0,0,0,0.5);
            padding:20px;
            border-radius:10px;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="logo">ROYAL PALACE</div>
        <ul>
            <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="booking.html">Booking</a></li>
        <li><a href="food.html">Food</a></li>
        <li><a href="collections.html">Collections</a></li>
        <li><a href="contact.html">Contact</a></li>
        </ul>
    </div>

    <div class="hero">

        <div class="slideshow">
            <img src="
            picture/Greaves_Taj_Rambagh_Palace.jpg">
            <img src="picture/5717295.jpg">
            <img src="picture/627de8f7-e937-46b9-a3c6-7cac0344cedd.jpg">
        </div>

        <h1>Welcome to Royal Palace Hotel</h1>

    </div>

</body>
</html>
